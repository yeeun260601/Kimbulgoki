<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김불고기</title>

<style>
body{
    font-family: sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:30px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    color:#ff6b00;
}

button{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#f0f0f0;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🤖 김불고기</h1>

<p>불곡고등학교 학생 도우미</p>

<button onclick="meal()">🍚 오늘의 급식</button>

<button onclick="timetable()">📚 오늘의 시간표</button>

<button onclick="teacher()">👨‍🏫 교내 선생님 정보</button>

<button onclick="dday()">📅 학사일정 D-Day</button>

<div class="result" id="result">
버튼을 눌러주세요.
</div>

</div>

<script>

function meal(){
document.getElementById("result").innerHTML =
"오늘의 급식 기능은 준비 중입니다.";
}

function timetable(){
document.getElementById("result").innerHTML =
"시간표 기능은 준비 중입니다.";
}

function teacher(){
document.getElementById("result").innerHTML =
"선생님 정보 기능은 준비 중입니다.";
}

function dday(){
document.getElementById("result").innerHTML =
"지필평가 D-Day 기능은 준비 중입니다.";
}

</script>

</body>
</html>
