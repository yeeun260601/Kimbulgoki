function set(html){document.getElementById("result").innerHTML=html;}
function ready(text){set(`<div class="info">${text}</div>`);}
function back(){return `<button class="back" onclick="showTeachers()">← 선생님 정보로 돌아가기</button>`;}

function showTeachers(){
set(`
<h2>👨‍🏫 선생님 정보</h2>
<input id="searchInput" placeholder="선생님 이름 검색" oninput="searchTeacher()">
<p class="help">🔎 이름을 입력하면 검색 결과가 파란색으로 표시됩니다.</p>
<div id="searchResult"></div>
<button onclick="showHomeroom()" class="sub">담임</button>
<button onclick="showSubjects()" class="sub">과목</button>
<button onclick="showDepartments()" class="sub">부서</button>
`);
}

function searchTeacher(){
const q=document.getElementById("searchInput").value.trim();
if(!q){document.getElementById("searchResult").innerHTML="";return;}
const list=teachers.filter(t=>t.name.includes(q));
document.getElementById("searchResult").innerHTML=list.length
? list.map(t=>`<button class="search-btn" onclick="showDetail('${t.name}')">${t.name}</button>`).join("")
: `<div class="info">검색 결과가 없습니다.</div>`;
}

function showHomeroom(){
const list=teachers.filter(t=>t.homeroom);
set(`<h2>담임</h2>`+
list.map(t=>`<button class="sub" onclick="showDetail('${t.name}')">${t.homeroom} ${t.name}</button>`).join("")+
back());
}

function showSubjects(){
set(`<h2>과목 선택</h2>`+
subjectList.map(s=>`<button class="sub" onclick="showBySubject('${s}')">${s}</button>`).join("")+
back());
}

function showBySubject(subject){
const list=teachers.filter(t=>t.subject===subject);
set(`<h2>${subject}</h2>`+
(list.length ? list.map(t=>`<button class="sub" onclick="showDetail('${t.name}')">${t.name}</button>`).join("") : `<div class="info">등록된 선생님 정보가 없습니다.</div>`)+
back());
}

function showDepartments(){
set(`<h2>부서 선택</h2>`+
deptList.map(d=>`<button class="sub" onclick="showByDept('${d}')">${d}</button>`).join("")+
back());
}

function showByDept(dept){
const list=teachers.filter(t=>t.dept===dept);
set(`<h2>${dept}</h2>`+
(list.length ? list.map(t=>`<button class="sub" onclick="showDetail('${t.name}')">${t.name}</button>`).join("") : `<div class="info">등록된 정보가 없습니다.</div>`)+
back());
}

function showDetail(name){
const t=teachers.find(x=>x.name===name);
set(`
<h2>${t.name} 선생님</h2>
<div class="info">
${t.subject ? `<b>과목</b><br>${t.subject}<br><br>` : ""}
${t.homeroom ? `<b>담당</b><br>${t.homeroom} 담임<br><br>` : ""}
${t.role ? `<b>역할/업무</b><br>${t.role}<br><br>` : ""}
<b>소속</b><br>${t.dept}<br><br>
<b>📍 위치</b><br>${t.floor} ${t.dept}
</div>
${back()}
`);
}
