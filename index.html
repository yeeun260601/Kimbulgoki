function set(html){document.getElementById("result").innerHTML = html;}
function ready(text){set(`<div class="info">${text}</div>`);}

function showTeachers(){
 set(`
  <h2>👨‍🏫 선생님 정보</h2>
  <button onclick="showHomeroom()" class="sub">담임</button>
  <button onclick="showSubjects()" class="sub">과목</button>
  <button onclick="showDepartments()" class="sub">부서</button>
  <button onclick="showEtc()" class="sub">기타</button>
 `);
}

function showHomeroom(){
 const list = teachers.filter(t=>t.role.includes("담임"));
 showList("담임 선생님", list);
}

function showSubjects(){
 const subjects = [...new Set(teachers.map(t=>t.subject))].sort();
 set(`<h2>과목 선택</h2>` + subjects.map(s=>`<button class="sub" onclick="showBySubject('${s}')">${s}</button>`).join("") + back());
}

function showBySubject(subject){
 showList(subject, teachers.filter(t=>t.subject===subject));
}

function showDepartments(){
 const depts = [...new Set(teachers.map(t=>t.dept))].sort();
 set(`<h2>부서 선택</h2>` + depts.map(d=>`<button class="sub" onclick="showByDept('${d}')">${d}</button>`).join("") + back());
}

function showByDept(dept){
 showList(dept, teachers.filter(t=>t.dept===dept));
}

function showEtc(){
 const list = teachers.filter(t =>
  ["교감","보건","상담","교육행정실","특수학급"].some(k => t.dept.includes(k) || t.subject.includes(k) || t.role.includes(k))
 );
 showList("기타", list);
}

function showList(title, list){
 set(`<h2>${title}</h2>` + list.map((t,i)=>`
  <button class="sub" onclick="showDetail('${t.name}')">${t.name} ${t.role ? "(" + t.role + ")" : ""}</button>
 `).join("") + back());
}

function showDetail(name){
 const t = teachers.find(x=>x.name===name);
 set(`
  <h2>${t.name} 선생님</h2>
  <div class="info">
   과목/업무: ${t.subject}<br>
   ${t.role ? "역할: " + t.role + "<br>" : ""}
   소속: ${t.dept}<br><br>
   📍 위치: ${t.location}<br>
   ${t.floor ? "층수: " + t.floor + "<br>" : ""}
  </div>
  ${back()}
 `);
}

function back(){
 return `<button class="back" onclick="showTeachers()">← 선생님 정보로 돌아가기</button>`;
}
