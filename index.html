function getDday(date){
  const today = new Date();
  today.setHours(0,0,0,0);
  const target = new Date(date);
  target.setHours(0,0,0,0);
  const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
  if(diff === 0) return "D-Day";
  if(diff > 0) return `D-${diff}`;
  return `D+${Math.abs(diff)}`;
}

function formatDate(event){
  const s = event.start.slice(5).replace("-", "/");
  if(event.end){
    const e = event.end.slice(5).replace("-", "/");
    return `${s} ~ ${e}`;
  }
  return s;
}

async function showTodayMeal(){
  const today = getKoreaDate(0);
  await showMealByDate(today, "오늘");
}

async function showNextMeal(){
  set(`<h2>🍚 다음 급식</h2><div class="info">가장 가까운 급식일을 찾는 중입니다...</div>`);

  for(let i = 1; i <= 14; i++){
    const date = getKoreaDate(i);
    const meal = await fetchMeal(date);

    if(meal){

      return;
    }
  }

  set(`

    <button class="back" onclick="showMeal()">← 급식 메뉴로 돌아가기</button>
  `);
}

async function showMealByDate(date, label){
  const meal = await fetchMeal(date);

  if(meal){
    showMealResult(meal, label);
  }else{
    set(`
      <h2>🍚 ${label} 급식</h2>
      <div class="info">
        <b>${label} (${prettyYMD(date)})</b><br><br>
        등록된 급식 정보가 없습니다.
      </div>
      <button class="back" onclick="showMeal()">← 급식 메뉴로 돌아가기</button>
    `);
  }
}

async function fetchMeal(date){
  const url = `https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=J10&SD_SCHUL_CODE=7530077&MLSV_YMD=${date}`;

  try{
    const res = await fetch(url);
    const data = await res.json();

    if(data.mealServiceDietInfo && data.mealServiceDietInfo[1]){
      return data.mealServiceDietInfo[1].row[0];
    }

    return null;
  }catch(error){
    return null;
  }
}

function showMealResult(meal, label){
  const date = meal.MLSV_YMD;
  const menu = cleanMeal(meal.DDISH_NM);

  set(`
    <h2>🍚 ${label} 급식</h2>
    <div class="info">
      <b>${label} (${prettyYMD(date)})</b><br><br>
      ${menu}
    </div>
    <button class="back" onclick="showMeal()">← 급식 메뉴로 돌아가기</button>
  `);
}

function cleanMeal(menu){
  return menu
    .replaceAll("<br/>", "<br>")
    .replaceAll("<br />", "<br>")
    .replace(/\([0-9.]+\)/g, "");
}

function prettyYMD(date){
  return `${date.slice(0,4)}.${date.slice(4,6)}.${date.slice(6,8)}`;
}

function getKoreaDate(addDays){
  const now = new Date();
  const korea = new Date(now.toLocaleString("en-US", {timeZone:"Asia/Seoul"}));
  korea.setDate(korea.getDate() + addDays);

  const yyyy = korea.getFullYear();
  const mm = String(korea.getMonth() + 1).padStart(2, "0");
  const dd = String(korea.getDate()).padStart(2, "0");

  return `${yyyy}${mm}${dd}`;
}
